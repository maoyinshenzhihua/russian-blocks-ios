name: Build iOS App (With Signing)

on:
  push:
    branches:
      - master
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build-signed.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build-signed.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  XCODE_VERSION: '15.0'
  IOS_DEPLOYMENT_TARGET: '15.0'
  BUNDLE_ID: com.poopblock.russian
  SCHEME: RussianPoopBlock

jobs:
  build-signed:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify macOS Version
        run: |
          sw_vers
          xcodebuild -version

      - name: Install XcodeGen
        run: |
          if ! which xcodegen > /dev/null; then
            echo "Installing XcodeGen..."
            brew install xcodegen
          else
            echo "XcodeGen already installed"
          fi
          xcodegen --version

      - name: Generate Xcode project
        working-directory: ./ios/RussianPoopBlock
        run: xcodegen generate

      - name: Fix Project Format Version
        working-directory: ./ios/RussianPoopBlock
        run: |
          sed -i '' 's/format = 77;/format = 56;/g' RussianPoopBlock.xcodeproj/project.pbxproj
          sed -i '' 's/projectFormatVersion = "77";/projectFormatVersion = "56";/g' RussianPoopBlock.xcodeproj/project.pbxproj
          grep -n "format" RussianPoopBlock.xcodeproj/project.pbxproj | head -5

      - name: Setup App Store Connect API Key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          if [ -n "$APP_STORE_CONNECT_API_KEY_CONTENT" ]; then
            mkdir -p ~/private_keys
            echo "$APP_STORE_CONNECT_API_KEY_CONTENT" | base64 --decode > ~/private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8
            ls -la ~/private_keys/
          else
            echo "App Store Connect API Key not provided, skipping..."
          fi

      - name: Import Certificates
        env:
          P12_CERTIFICATE: ${{ secrets.P12_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          if [ -n "$P12_CERTIFICATE" ] && [ -n "$P12_PASSWORD" ]; then
            echo "$P12_CERTIFICATE" | base64 --decode > certificate.p12
            security create-keychain -p "" build-agent.keychain
            security set-keychain-settings build-agent.keychain
            security unlock-keychain -p "" build-agent.keychain
            security import certificate.p12 -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k build-agent.keychain
            security set-key-partition-list -S apple-tool:,apple:,codesign: -k "" build-agent.keychain
            security list-keychain -d user -s build-agent.keychain
          else
            echo "P12 Certificate not provided, skipping..."
          fi

      - name: Setup Provisioning Profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          if [ -n "$PROVISIONING_PROFILE" ]; then
            echo "$PROVISIONING_PROFILE" | base64 --decode > Profile.mobileprovision
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp Profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          else
            echo "Provisioning Profile not provided, skipping..."
          fi

      - name: List Available Code Signing Identities
        run: |
          echo "=== Available Code Signing Identities ==="
          security find-identity -v -p codesigning || true
          echo ""
          echo "=== Provisioning Profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || true

      - name: Build iOS App (Debug)
        working-directory: ./ios/RussianPoopBlock
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          CODE_SIGN_STYLE: ${{ vars.CODE_SIGN_STYLE || 'Automatic' }}
          PRODUCT_BUNDLE_IDENTIFIER: ${{ vars.BUNDLE_ID || env.BUNDLE_ID }}
          DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM || '' }}
          CODE_SIGN_IDENTITY: ${{ vars.CODE_SIGN_IDENTITY || '-' }}
        run: |
          echo "=== Building Debug Configuration ==="
          xcodebuild -project RussianPoopBlock.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            build \
            CODE_SIGN_IDENTITY="${{ vars.CODE_SIGN_IDENTITY || '-' }}" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=${{ env.IOS_DEPLOYMENT_TARGET }}

      - name: Find Built Products
        id: find-built
        run: |
          BUILD_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null | head -1)
          echo "Found app at: $BUILD_PATH"
          echo "app_path=$BUILD_PATH" >> $GITHUB_OUTPUT

      - name: Create Output Directory
        run: mkdir -p output

      - name: Copy Built App
        run: |
          if [ -n "${{ steps.find-built.outputs.app_path }}" ]; then
            cp -r "${{ steps.find-built.outputs.app_path }}" output/
            ls -la output/
          else
            echo "No built app found"
          fi

      - name: Create ZIP Archive
        run: |
          if [ -d "output" ] && [ "$(ls -A output/)" ]; then
            cd output
            zip -r ../output/RussianPoopBlock-${{ github.run_number }}.zip *.app || true
            cd ..
            ls -la output/
          else
            echo "No output to archive"
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RussianPoopBlock-iOS-${{ github.run_number }}
          path: output/RussianPoopBlock-${{ github.run_number }}.zip
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## iOS Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Success |" >> $GITHUB_STEP_SUMMARY

      - name: Failure Summary
        if: failure()
        run: |
          echo "## Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please check the build logs for details." >> $GITHUB_STEP_SUMMARY
