name: Build iOS App (With Signing)

on:
  push:
    branches:
      - master
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build-signed.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build-signed.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  XCODE_VERSION: '15.0'
  IOS_DEPLOYMENT_TARGET: '15.0'
  BUNDLE_ID: com.poopblock.russian
  SCHEME: RussianPoopBlock

jobs:
  build-signed:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify macOS Version
        run: |
          sw_vers
          xcodebuild -version

      - name: Install XcodeGen
        run: |
          if ! which xcodegen > /dev/null; then
            echo "Installing XcodeGen..."
            brew install xcodegen
          else
            echo "XcodeGen already installed"
          fi
          xcodegen --version

      - name: Generate Xcode project
        working-directory: ./ios/RussianPoopBlock
        run: xcodegen generate

      - name: Fix Project Format Version
        working-directory: ./ios/RussianPoopBlock
        run: |
          find . -name "*.pbxproj" -exec sed -i '' 's/77/56/g' {} \;

      - name: Setup App Store Connect API Key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          if [ -n "$APP_STORE_CONNECT_API_KEY_CONTENT" ]; then
            mkdir -p ~/private_keys
            echo "$APP_STORE_CONNECT_API_KEY_CONTENT" | base64 --decode > ~/private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8
            echo "App Store Connect API Key installed"
          else
            echo "App Store Connect API Key not provided"
          fi

      - name: Import Certificates
        id: import-certs
        env:
          P12_CERTIFICATE: ${{ secrets.P12_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          if [ -n "$P12_CERTIFICATE" ] && [ -n "$P12_PASSWORD" ]; then
            echo "$P12_CERTIFICATE" | base64 --decode > certificate.p12
            security create-keychain -p "" build-agent.keychain
            security set-keychain-settings build-agent.keychain
            security unlock-keychain -p "" build-agent.keychain
            security import certificate.p12 -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k build-agent.keychain
            security set-key-partition-list -S apple-tool:,apple:,codesign: -k "" build-agent.keychain
            security list-keychain -d user -s build-agent.keychain
            echo "CERT_IMPORTED=true" >> $GITHUB_ENV
          else
            echo "CERT_IMPORTED=false" >> $GITHUB_ENV
            echo "P12 Certificate not provided, will create unsigned build"
          fi

      - name: Setup Provisioning Profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          if [ -n "$PROVISIONING_PROFILE" ]; then
            echo "$PROVISIONING_PROFILE" | base64 --decode > Profile.mobileprovision
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp Profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
            echo "Provisioning Profile installed"
          fi

      - name: Build iOS App (Archive)
        working-directory: ./ios/RussianPoopBlock
        env:
          PRODUCT_BUNDLE_IDENTIFIER: ${{ vars.BUNDLE_ID || env.BUNDLE_ID }}
          DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM || '' }}
        run: |
          echo "=== Building for Archive ==="
          xcodebuild -project RussianPoopBlock.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            archive \
            -archivePath ./build/RussianPoopBlock \
            CODE_SIGN_IDENTITY="${{ vars.CODE_SIGN_IDENTITY || '-' }}" \
            CODE_SIGNING_REQUIRED=${{ env.CERT_IMPORTED }} \
            CODE_SIGNING_ALLOWED=${{ env.CERT_IMPORTED }} \
            DEVELOPMENT_TEAM="${{ vars.DEVELOPMENT_TEAM || '' }}" \
            IPHONEOS_DEPLOYMENT_TARGET=${{ env.IOS_DEPLOYMENT_TARGET }}

      - name: Create Output Directory
        working-directory: ./ios/RussianPoopBlock
        run: mkdir -p output

      - name: Export IPA (Signed)
        if: env.CERT_IMPORTED == 'true'
        working-directory: ./ios/RussianPoopBlock
        env:
          PRODUCT_BUNDLE_IDENTIFIER: ${{ vars.BUNDLE_ID || env.BUNDLE_ID }}
        run: |
          echo "=== Exporting Signed IPA ==="
          xcodebuild -exportArchive \
            -archivePath ./build/RussianPoopBlock.xcarchive \
            -exportPath ./output \
            -exportOptionsPlist ./ExportOptions.plist \
            PRODUCT_BUNDLE_IDENTIFIER=${{ vars.BUNDLE_ID || env.BUNDLE_ID }}
          ls -la ./output/

      - name: Export App (Unsigned)
        if: env.CERT_IMPORTED != 'true'
        working-directory: ./ios/RussianPoopBlock
        run: |
          echo "=== Creating Unsigned App Package ==="
          cp -r ./build/RussianPoopBlock.xcarchive/Products/Applications/*.app ./output/
          ls -la ./output/

      - name: Create IPA from Unsigned App
        if: env.CERT_IMPORTED != 'true'
        working-directory: ./ios/RussianPoopBlock
        run: |
          echo "=== Creating Unsigned IPA ==="
          ls -la output/
          APP_PATH=$(find output -name "*.app" -type d | head -1)
          echo "Found app: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/RussianPoopBlock.app
            zip -r output/RussianPoopBlock-${{ github.run_number }}.ipa Payload
            rm -rf Payload
          fi
          ls -la output/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RussianPoopBlock-iOS-${{ github.run_number }}
          path: output/RussianPoopBlock-${{ github.run_number }}.ipa
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## iOS Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | [Download IPA](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts) |" >> $GITHUB_STEP_SUMMARY
          echo "| Signed | ${{ env.CERT_IMPORTED }} |" >> $GITHUB_STEP_SUMMARY

      - name: Failure Summary
        if: failure()
        run: |
          echo "## Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please check the build logs for details." >> $GITHUB_STEP_SUMMARY
