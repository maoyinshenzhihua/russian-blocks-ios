name: Build iOS App (With Signing)

on:
  push:
    branches: [ main ]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build-signed.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build-signed.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  XCODE_VERSION: '15.0'
  IOS_DEPLOYMENT_TARGET: '15.0'
  BUNDLE_ID: com.poopblock.russian
  SCHEME: RussianPoopBlock

jobs:
  build-signed:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify macOS Version
        run: sw_vers && xcodebuild -version

      - name: Install XcodeGen
        run: |
          if ! which xcodegen > /dev/null; then
            echo "Installing XcodeGen..."
            brew install xcodegen
          else
            echo "XcodeGen already installed"
          fi
          xcodegen --version

      - name: Generate Xcode project
        working-directory: ./ios/RussianPoopBlock
        run: xcodegen generate

      - name: Setup App Store Connect API Key (Recommended)
        if: env.APP_STORE_CONNECT_API_KEY_CONTENT != ''
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_CONTENT" | base64 --decode > ~/private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8
          ls -la ~/private_keys/

      - name: Import Certificates (Alternative: P12 Certificate)
        if: env.P12_CERTIFICATE != '' && env.P12_PASSWORD != ''
        env:
          P12_CERTIFICATE: ${{ secrets.P12_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build-agent.keychain
          security set-keychain-settings build-agent.keychain
          security unlock-keychain -p "" build-agent.keychain
          security import certificate.p12 -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k build-agent.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "" build-agent.keychain
          security list-keychain -d user -s build-agent.keychain

      - name: Setup Provisioning Profile
        if: env.PROVISIONING_PROFILE != ''
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          echo "$PROVISIONING_PROFILE" | base64 --decode > Profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp Profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: List Available Code Signing Identities
        run: |
          echo "=== Available Code Signing Identities ==="
          security find-identity -v -p codesigning
          echo ""
          echo "=== Provisioning Profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS App (Debug)
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == ''
        working-directory: ./ios/RussianPoopBlock
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          CODE_SIGN_STYLE: ${{ vars.CODE_SIGN_STYLE || 'Automatic' }}
          PRODUCT_BUNDLE_IDENTIFIER: ${{ vars.BUNDLE_ID || env.BUNDLE_ID }}
          DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM || '' }}
          CODE_SIGN_IDENTITY: ${{ vars.CODE_SIGN_IDENTITY || '-' }}
        run: |
          echo "=== Building Debug Configuration ==="
          xcodebuild -project RussianPoopBlock.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            build \
            CODE_SIGN_IDENTITY="${{ vars.CODE_SIGN_IDENTITY || '-' }}" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=${{ env.IOS_DEPLOYMENT_TARGET }}

      - name: Build iOS App (Release)
        if: github.event.inputs.build_type == 'release'
        working-directory: ./ios/RussianPoopBlock
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          CODE_SIGN_STYLE: ${{ vars.CODE_SIGN_STYLE || 'Automatic' }}
          PRODUCT_BUNDLE_IDENTIFIER: ${{ vars.BUNDLE_ID || env.BUNDLE_ID }}
          DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM || '' }}
          CODE_SIGN_IDENTITY: ${{ vars.CODE_SIGN_IDENTITY || '-' }}
        run: |
          echo "=== Building Release Configuration ==="
          xcodebuild -project RussianPoopBlock.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            build \
            CODE_SIGN_IDENTITY="${{ vars.CODE_SIGN_IDENTITY || '-' }}" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=${{ env.IOS_DEPLOYMENT_TARGET }}

      - name: Find Built Products
        id: find-built
        run: |
          BUILD_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null | head -1)
          echo "Found app at: $BUILD_PATH"
          echo "app_path=$BUILD_PATH" >> $GITHUB_OUTPUT

      - name: Create Output Directory
        run: mkdir -p output

      - name: Copy Built App
        if: steps.find-built.outputs.app_path != ''
        run: |
          cp -r "${{ steps.find-built.outputs.app_path }}" output/
          ls -la output/

      - name: Create ZIP Archive
        if: steps.find-built.outputs.app_path != ''
        run: |
          cd output
          zip -r ../output/RussianPoopBlock-${{ github.run_number }}.zip *.app
          cd ..
          ls -la output/

      - name: Upload Build Artifact
        if: steps.find-built.outputs.app_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: RussianPoopBlock-iOS-${{ github.run_number }}
          path: output/RussianPoopBlock-${{ github.run_number }}.zip
          retention-days: 30

      - name: Generate IPA (Ad Hoc)
        if: steps.find-built.outputs.app_path != '' && env.PROVISIONING_PROFILE != ''
        working-directory: ./output
        run: |
          xcrun altool --validate-app -f RussianPoopBlock-${{ github.run_number }}.zip \
            -t ios \
            --apiKey ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }} || true

      - name: Build Summary
        run: |
          echo "## ✅ iOS Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Type | ${{ github.event.inputs.build_type || 'debug' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Success |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | [Download ZIP](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the artifact ZIP file" >> $GITHUB_STEP_SUMMARY
          echo "2. Unzip and locate the `.app` bundle" >> $GITHUB_STEP_SUMMARY
          echo "3. For simulator testing: Drag `.app` to Xcode simulator" >> $GITHUB_STEP_SUMMARY
          echo "4. For real device: Sign with your Apple Developer certificate" >> $GITHUB_STEP_SUMMARY

      - name: Failure Summary
        if: failure()
        run: |
          echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please check the build logs for details." >> $GITHUB_STEP_SUMMARY
