name: Build HeartFloat iOS App

on:
  push:
    branches:
      - master
    paths:
      - 'HeartFloat/**'
  workflow_dispatch:

env:
  XCODE_VERSION: '15.0'
  IOS_DEPLOYMENT_TARGET: '14.0'
  SCHEME: HeartFloat

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Generate project
        working-directory: ./HeartFloat
        run: |
          if which xcodegen >/dev/null; then
            echo "XcodeGen is already installed"
          else
            brew install xcodegen
          fi
          xcodegen generate

      - name: Build
        run: |
          xcodebuild -project HeartFloat.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create IPA
        run: |
          mkdir -p output
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null | grep -v "PlugIns" | head -1)
          echo "Found app at: $APP_PATH"
          if [ -n "$APP_PATH" ]; then
            cp -r "$APP_PATH" ./output/
            ls -la ./output/
            cd ./output
            mkdir -p Payload
            cp -r *.app Payload/
            zip -r ./HeartFloat-${{ github.run_number }}.ipa Payload
            ls -la
          else
            echo "ERROR: No app found!"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: HeartFloat-iOS-${{ github.run_number }}
          path: output/HeartFloat-${{ github.run_number }}.ipa
          retention-days: 7
