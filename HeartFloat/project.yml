name: HeartFloat
options:
  bundleIdPrefix: com.heartfloat
  deploymentTarget:
    iOS: "14.0"
  xcodeVersion: "15.0"
  developmentRegion: zh_CN
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    PROJECT_FORMAT_VERSION: 56
    CLANG_ENABLE_MODULES: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    ENABLE_BITCODE: NO

targets:
  HeartFloat:
    type: application
    platform: iOS
    sources:
      - path: Sources
        type: group
      - path: Resources
        type: group
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.heartfloat.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: HeartFloat
        CFBundleDisplayName: 心率悬浮
        CFBundleIdentifier: com.heartfloat.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: HeartFloat
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: true
        UIBackgroundModes:
          - bluetooth-central
          - audio
        NSBluetoothAlwaysUsageDescription: 需要蓝牙权限连接心率监测设备
        NSBluetoothPeripheralUsageDescription: 需要蓝牙权限连接心率监测设备
        NSLocalNetworkUsageDescription: 需要本地网络权限提供心率数据HTTP接口
